<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Lavoro 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --border-strong: #c8c5ba;
    --text: #1a1917;
    --text-muted: #6b6860;
    --text-faint: #9e9b94;
    --accent: #1a1917;
    --radius: 8px;
    --radius-lg: 12px;

    /* day status colors */
    --c-worked-bg: #eef7ee;
    --c-worked-border: #7dc47d;
    --c-worked-text: #1a5c1a;
    --c-planned-bg: #eef2fc;
    --c-planned-border: #7fa8e8;
    --c-planned-text: #1a3a8f;
    --c-absent-bg: #fdf0ef;
    --c-absent-border: #e8847a;
    --c-absent-text: #8f1a1a;
    --c-today-ring: #f59e0b;
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    position: sticky; top: 0; z-index: 200;
  }
  .header-title h1 { font-size: 18px; font-weight: 600; }
  .header-title p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  /* LEGEND */
  .legend { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
  .leg-dot { width: 11px; height: 11px; border-radius: 3px; }
  .leg-dot.worked  { background: var(--c-worked-border); }
  .leg-dot.planned { background: var(--c-planned-border); }
  .leg-dot.absent  { background: var(--c-absent-border); }
  .leg-dot.empty   { background: var(--border-strong); }

  /* STATS BAR */
  .stats-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 32px; display: flex; gap: 20px; flex-wrap: wrap; }
  .stat { font-size: 13px; color: var(--text-muted); }
  .stat strong { font-weight: 600; color: var(--text); }

  /* MONTH NAV */
  .month-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px 8px;
    max-width: 900px;
  }
  .month-label { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .nav-btns { display: flex; gap: 8px; }
  .nav-btn {
    width: 36px; height: 36px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; color: var(--text);
  }
  .nav-btn:hover { background: var(--bg); border-color: var(--border-strong); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* CALENDAR GRID */
  .calendar-wrap { padding: 0 32px 40px; max-width: 900px; }

  .weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 4px; margin-bottom: 4px;
  }
  .weekday { font-size: 11px; font-weight: 600; color: var(--text-faint); text-align: center; padding: 6px 0; text-transform: uppercase; letter-spacing: 0.5px; }
  .weekday.weekend { color: #e07050; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }

  .cal-day {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    min-height: 80px;
    padding: 8px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
    display: flex; flex-direction: column; gap: 4px;
  }
  .cal-day:hover { border-color: var(--border-strong); transform: scale(1.02); }
  .cal-day.empty-cell { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
  .cal-day.empty-cell:hover { transform: none; }
  .cal-day.outside-range { opacity: 0.35; cursor: default; pointer-events: none; }
  .cal-day.today { box-shadow: 0 0 0 2px var(--c-today-ring); }
  .cal-day.weekend-day { background: #fafaf8; }

  .cal-day.worked  { background: var(--c-worked-bg);  border-color: var(--c-worked-border); }
  .cal-day.planned { background: var(--c-planned-bg); border-color: var(--c-planned-border); }
  .cal-day.absent  { background: var(--c-absent-bg);  border-color: var(--c-absent-border); }

  .day-num {
    font-size: 13px; font-weight: 600; color: var(--text);
    width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
  }
  .cal-day.worked  .day-num { color: var(--c-worked-text); }
  .cal-day.planned .day-num { color: var(--c-planned-text); }
  .cal-day.absent  .day-num { color: var(--c-absent-text); }
  .cal-day.today   .day-num { background: var(--c-today-ring); color: #fff; }

  .day-status { font-size: 10px; font-weight: 500; line-height: 1.3; }
  .cal-day.worked  .day-status { color: var(--c-worked-text); }
  .cal-day.planned .day-status { color: var(--c-planned-text); }
  .cal-day.absent  .day-status { color: var(--c-absent-text); }

  .day-note-preview { font-size: 10px; color: var(--text-muted); line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .day-dot { position: absolute; top: 7px; right: 7px; width: 6px; height: 6px; border-radius: 50%; background: var(--c-worked-border); }

  /* MODAL OVERLAY */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    z-index: 500; display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface); border-radius: var(--radius-lg);
    padding: 28px; width: 100%; max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    transform: translateY(12px); transition: transform 0.2s;
  }
  .overlay.open .modal { transform: translateY(0); }

  .modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
  .modal-date { font-size: 18px; font-weight: 600; }
  .modal-date-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .btn-close { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); flex-shrink: 0; }
  .btn-close:hover { background: var(--bg); }

  /* STATUS SELECTOR */
  .status-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .status-btn {
    flex: 1; padding: 8px 6px; border-radius: 8px; border: 1.5px solid var(--border);
    background: transparent; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; text-align: center; transition: all 0.15s; color: var(--text-muted);
  }
  .status-btn:hover { border-color: var(--border-strong); }
  .status-btn.sel-none    { background: var(--bg); border-color: var(--border-strong); color: var(--text); }
  .status-btn.sel-worked  { background: var(--c-worked-bg);  border-color: var(--c-worked-border);  color: var(--c-worked-text); }
  .status-btn.sel-planned { background: var(--c-planned-bg); border-color: var(--c-planned-border); color: var(--c-planned-text); }
  .status-btn.sel-absent  { background: var(--c-absent-bg);  border-color: var(--c-absent-border);  color: var(--c-absent-text); }

  /* FORM FIELDS */
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 9px 12px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--bg); color: var(--text); outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); background: var(--surface); }
  .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .time-row { display: flex; gap: 8px; }
  .time-row .field { flex: 1; margin-bottom: 0; }

  .prefilled-note { font-size: 12px; color: var(--c-planned-text); background: var(--c-planned-bg); border: 1px solid var(--c-planned-border); border-radius: 6px; padding: 8px 10px; margin-bottom: 16px; line-height: 1.5; }
  .prefilled-note strong { display: block; margin-bottom: 2px; }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .btn-save { padding: 9px 20px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-save:hover { opacity: 0.85; }
  .btn-cancel { padding: 9px 16px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; }
  .btn-cancel:hover { background: var(--bg); }
  .btn-reset { padding: 9px 16px; background: transparent; color: var(--c-absent-text); border: 1px solid var(--c-absent-border); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; margin-right: auto; }
  .btn-reset:hover { background: var(--c-absent-bg); }

  @media (max-width: 640px) {
    header, .stats-bar, .month-nav, .calendar-wrap { padding-left: 12px; padding-right: 12px; }
    .cal-day { min-height: 58px; padding: 5px; }
    .day-num { font-size: 12px; width: 20px; height: 20px; }
    .day-status { display: none; }
    .modal { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>Calendario Lavoro 2026</h1>
    <p>12 maggio → 31 dicembre 2026</p>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot worked"></div> Ho lavorato</div>
    <div class="leg"><div class="leg-dot planned"></div> Pianificato</div>
    <div class="leg"><div class="leg-dot absent"></div> Assente</div>
    <div class="leg"><div class="leg-dot empty"></div> Giorno libero</div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat">Giorni lavorati: <strong id="stat-worked">0</strong></div>
  <div class="stat">Pianificati: <strong id="stat-planned">0</strong></div>
  <div class="stat">Assenze: <strong id="stat-absent">0</strong></div>
  <div class="stat">Ore totali registrate: <strong id="stat-hours">0h</strong></div>
</div>

<div class="month-nav">
  <button class="nav-btn" id="btn-prev" onclick="changeMonth(-1)">←</button>
  <span class="month-label" id="month-label"></span>
  <button class="nav-btn" id="btn-next" onclick="changeMonth(1)">→</button>
</div>
<div class="calendar-wrap">
  <div class="weekdays">
    <div class="weekday">Lun</div><div class="weekday">Mar</div><div class="weekday">Mer</div>
    <div class="weekday">Gio</div><div class="weekday">Ven</div>
    <div class="weekday weekend">Sab</div><div class="weekday weekend">Dom</div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-date" id="modal-date"></div>
        <div class="modal-date-sub" id="modal-date-sub"></div>
      </div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>

    <div class="prefilled-note" id="prefilled-note" style="display:none">
      <strong>📌 Nota pre-impostata</strong>
      <span id="prefilled-text"></span>
    </div>

    <div style="margin-bottom:12px;font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px;">Stato del giorno</div>
    <div class="status-row">
      <button class="status-btn" id="btn-none"    onclick="selectStatus('none')">— Nessuno</button>
      <button class="status-btn" id="btn-worked"  onclick="selectStatus('worked')">✓ Ho lavorato</button>
      <button class="status-btn" id="btn-planned" onclick="selectStatus('planned')">📅 Pianificato</button>
      <button class="status-btn" id="btn-absent"  onclick="selectStatus('absent')">✗ Assente</button>
    </div>

    <div id="worked-fields">
      <div class="time-row">
        <div class="field"><label>Ora inizio</label><input type="time" id="f-start" value="09:00"></div>
        <div class="field"><label>Ora fine</label><input type="time" id="f-end" value="17:00"></div>
      </div>
      <div class="field" style="margin-top:12px"><label>Pausa pranzo</label><input type="text" id="f-break" placeholder="es. 13:00 – 14:00"></div>
      <div class="field"><label>Cosa ho fatto</label><textarea id="f-notes" placeholder="Descrivi le attività svolte…"></textarea></div>
    </div>

    <div id="planned-fields" style="display:none">
      <div class="field"><label>Disponibilità</label><input type="text" id="f-availability" placeholder="es. dalle 14:45, tutto il giorno…"></div>
      <div class="field"><label>Note</label><textarea id="f-planned-notes" placeholder="Note aggiuntive…" style="min-height:60px"></textarea></div>
    </div>

    <div id="absent-fields" style="display:none">
      <div class="field"><label>Motivo assenza</label><input type="text" id="f-absent-reason" placeholder="es. come comunicato al colloquio…"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-reset" id="btn-reset" onclick="resetDay()">Cancella</button>
      <button class="btn-cancel" onclick="closeModal()">Annulla</button>
      <button class="btn-save" onclick="saveDay()">Salva</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const START = {y:2026, m:4}; // May = month index 4 (0-based)
const END   = {y:2026, m:11}; // December = 11
const START_DAY = 12; // calendar starts 12 May 2026
const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DAYS_IT   = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];

// ─── PRE-FILLED DATA ──────────────────────────────────────
const PREFILLED = {
  '2026-05-12': { status:'worked', start:'09:30', end:'17:00', breakTime:'13:00 – 14:30', notes:'', preNote:'Lavorato 9:30–17:00, pausa pranzo 13:00–14:30' },
  '2026-05-15': { status:'planned', availability:'Disponibile dalle 14:45', preNote:'Disponibile dalle 14:45' },
  '2026-05-22': { status:'planned', availability:'Disponibile tutto il giorno', preNote:'Disponibile tutto il giorno' },
  '2026-05-26': { status:'planned', availability:'Disponibile dalle 14:45', preNote:'Disponibile dalle 14:45' },
  '2026-05-29': { status:'absent', absentReason:'Come comunicato al secondo colloquio in presenza', preNote:'Assente – come comunicato al secondo colloquio in presenza' },
  '2026-06-02': { status:'absent', absentReason:'Come comunicato al secondo colloquio in presenza', preNote:'Assente – come comunicato al secondo colloquio in presenza' },
  '2026-06-05': { status:'planned', availability:'Disponibile dalle 14:45', preNote:'Disponibile dalle 14:45' },
  '2026-06-09': { status:'planned', availability:'Disponibile dalle 14:45', preNote:'Disponibile dalle 14:45' },
  '2026-06-12': { status:'planned', availability:'Disponibile tutto il giorno', preNote:'Disponibile tutto il giorno' },
  '2026-06-16': { status:'planned', availability:'Disponibile dalle 14:45', preNote:'Disponibile dalle 14:45' },
  '2026-06-19': { status:'planned', availability:'Disponibile tutto il giorno', preNote:'Disponibile tutto il giorno' },
  '2026-06-23': { status:'planned', availability:'Disponibile tutto il giorno', preNote:'Disponibile tutto il giorno' },
  '2026-06-26': { status:'planned', availability:'Disponibile dalle 14:45', preNote:'Disponibile dalle 14:45' },
  '2026-07-03': { status:'planned', availability:'Disponibile tutto il giorno', preNote:'Disponibile tutto il giorno' },
  '2026-07-07': { status:'planned', availability:'Disponibile dalle 14:45', preNote:'Disponibile dalle 14:45' },
  '2026-07-10': { status:'planned', availability:'Disponibile tutto il giorno', preNote:'Disponibile tutto il giorno' },
};

// ─── FIREBASE CONFIG ──────────────────────────────────────
const FIREBASE_URL = 'https://calendario-mattia-44023-default-rtdb.europe-west1.firebasedatabase.app/calendar.json';

// ─── STATE ────────────────────────────────────────────────
let data = {};
let curYear  = 2026;
let curMonth = 4; // May
let editingKey = null;
let selectedStatus = 'none';

async function loadData() {
  try {
    const res = await fetch(FIREBASE_URL);
    const saved = (await res.json()) || {};
    Object.keys(PREFILLED).forEach(k => {
      if (!saved[k]) saved[k] = Object.assign({}, PREFILLED[k]);
    });
    return saved;
  } catch(e) {
    const saved = {};
    Object.keys(PREFILLED).forEach(k => {
      saved[k] = Object.assign({}, PREFILLED[k]);
    });
    return saved;
  }
}

async function save() {
  try {
    await fetch(FIREBASE_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  } catch(e) {
    console.error('Salvataggio fallito', e);
  }
}

function dateKey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function isInRange(y, m, d) {
  if (y < 2026 || y > 2026) return false;
  if (m < 4) return false; // before May
  if (m === 4 && d < 12) return false; // before 12 May
  if (m > 11) return false;
  return true;
}
function isToday(y, m, d) {
  const t = new Date();
  return t.getFullYear()===y && t.getMonth()===m && t.getDate()===d;
}

// ─── STATS ────────────────────────────────────────────────
function updateStats() {
  let worked=0, planned=0, absent=0, hours=0;
  Object.values(data).forEach(d => {
    if (d.status==='worked')  { worked++; if (d.start&&d.end) { const [sh,sm]=d.start.split(':').map(Number); const [eh,em]=d.end.split(':').map(Number); let h=(eh*60+em-sh*60-sm)/60; if(h>0)hours+=h; } }
    if (d.status==='planned') planned++;
    if (d.status==='absent')  absent++;
  });
  document.getElementById('stat-worked').textContent = worked;
  document.getElementById('stat-planned').textContent = planned;
  document.getElementById('stat-absent').textContent = absent;
  document.getElementById('stat-hours').textContent = hours>0 ? hours.toFixed(1)+'h' : '0h';
}

// ─── RENDER CALENDAR ──────────────────────────────────────
function renderCalendar() {
  const label = MONTHS_IT[curMonth] + ' ' + curYear;
  document.getElementById('month-label').textContent = label;
  document.getElementById('btn-prev').disabled = (curYear===2026 && curMonth===4);
  document.getElementById('btn-next').disabled = (curYear===2026 && curMonth===11);

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const firstDay = new Date(curYear, curMonth, 1).getDay(); // 0=Sun
  const totalDays = new Date(curYear, curMonth+1, 0).getDate();
  // Adjust: Monday=0
  const offset = (firstDay === 0) ? 6 : firstDay - 1;

  for (let i=0; i<offset; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-day empty-cell';
    grid.appendChild(cell);
  }

  for (let d=1; d<=totalDays; d++) {
    const inRange = isInRange(curYear, curMonth, d);
    const key = dateKey(curYear, curMonth, d);
    const dayData = data[key];
    const status = dayData ? dayData.status : null;
    const dow = new Date(curYear, curMonth, d).getDay(); // 0=Sun,6=Sat
    const isWeekend = dow===0 || dow===6;

    const cell = document.createElement('div');
    let cls = 'cal-day';
    if (!inRange) cls += ' outside-range';
    if (isWeekend) cls += ' weekend-day';
    if (isToday(curYear, curMonth, d)) cls += ' today';
    if (status === 'worked')  cls += ' worked';
    if (status === 'planned') cls += ' planned';
    if (status === 'absent')  cls += ' absent';
    cell.className = cls;

    if (inRange) cell.onclick = () => openModal(curYear, curMonth, d);

    // Day number
    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = d;
    cell.appendChild(num);

    // Status label
    if (status && status !== 'none') {
      const sl = document.createElement('div');
      sl.className = 'day-status';
      if (status === 'worked') {
        const h = dayData.start && dayData.end ? dayData.start+'–'+dayData.end : 'Lavorato';
        sl.textContent = h;
      } else if (status === 'planned') {
        sl.textContent = dayData.availability || 'Pianificato';
      } else if (status === 'absent') {
        sl.textContent = 'Assente';
      }
      cell.appendChild(sl);
    }

    // Note preview
    if (status === 'worked' && dayData.notes) {
      const np = document.createElement('div');
      np.className = 'day-note-preview';
      np.textContent = dayData.notes;
      cell.appendChild(np);
      const dot = document.createElement('div');
      dot.className = 'day-dot';
      cell.appendChild(dot);
    }

    grid.appendChild(cell);
  }

  updateStats();
}

function changeMonth(dir) {
  curMonth += dir;
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  if (curMonth > 11) { curMonth = 0;  curYear++; }
  renderCalendar();
}

// ─── MODAL ────────────────────────────────────────────────
function openModal(y, m, d) {
  editingKey = dateKey(y, m, d);
  const dayData = data[editingKey] || {};
  const dow = DAYS_IT[new Date(y, m, d).getDay()];
  document.getElementById('modal-date').textContent = dow + ' ' + d + ' ' + MONTHS_IT[m] + ' ' + y;
  document.getElementById('modal-date-sub').textContent = '';

  // Prefilled note
  const pf = PREFILLED[editingKey];
  if (pf && pf.preNote) {
    document.getElementById('prefilled-note').style.display = 'block';
    document.getElementById('prefilled-text').textContent = pf.preNote;
  } else {
    document.getElementById('prefilled-note').style.display = 'none';
  }

  // Fill form
  selectStatus(dayData.status || 'none', false);
  document.getElementById('f-start').value      = dayData.start || '09:00';
  document.getElementById('f-end').value        = dayData.end   || '17:00';
  document.getElementById('f-break').value      = dayData.breakTime || '';
  document.getElementById('f-notes').value      = dayData.notes || '';
  document.getElementById('f-availability').value    = dayData.availability || (pf && pf.availability ? pf.availability : '');
  document.getElementById('f-planned-notes').value   = dayData.plannedNotes || '';
  document.getElementById('f-absent-reason').value   = dayData.absentReason || (pf && pf.absentReason ? pf.absentReason : '');

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  editingKey = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function selectStatus(s, render=true) {
  selectedStatus = s;
  ['none','worked','planned','absent'].forEach(x => {
    const btn = document.getElementById('btn-'+x);
    btn.className = 'status-btn' + (x === s ? ' sel-'+x : '');
  });
  document.getElementById('worked-fields').style.display  = s==='worked'  ? 'block' : 'none';
  document.getElementById('planned-fields').style.display = s==='planned' ? 'block' : 'none';
  document.getElementById('absent-fields').style.display  = s==='absent'  ? 'block' : 'none';
}

function saveDay() {
  if (!editingKey) return;
  const s = selectedStatus;
  if (s === 'none') {
    delete data[editingKey];
  } else if (s === 'worked') {
    data[editingKey] = {
      status: 'worked',
      start: document.getElementById('f-start').value,
      end:   document.getElementById('f-end').value,
      breakTime: document.getElementById('f-break').value,
      notes: document.getElementById('f-notes').value,
    };
  } else if (s === 'planned') {
    data[editingKey] = {
      status: 'planned',
      availability: document.getElementById('f-availability').value,
      plannedNotes: document.getElementById('f-planned-notes').value,
    };
  } else if (s === 'absent') {
    data[editingKey] = {
      status: 'absent',
      absentReason: document.getElementById('f-absent-reason').value,
    };
  }
  save();
  closeModal();
  renderCalendar();
}

function resetDay() {
  if (!editingKey) return;
  if (!confirm('Cancellare i dati di questo giorno?')) return;
  // If it's a prefilled day, restore prefilled data
  if (PREFILLED[editingKey]) {
    data[editingKey] = Object.assign({}, PREFILLED[editingKey]);
  } else {
    delete data[editingKey];
  }
  save();
  closeModal();
  renderCalendar();
}

// ─── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ─── INIT ─────────────────────────────────────────────────
(async () => {
  data = await loadData();
  renderCalendar();
})();
</script>
</body>
</html>
